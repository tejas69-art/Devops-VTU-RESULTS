# =============================================================================
# Deployment — VTU Frontend (Kustomize Base)
# Image tag is set by overlays via kustomize.config.k8s.io/v1beta1 images patch.
# Rolling update with zero downtime, probes, security context.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vtu-results
  labels:
    app: vtu-results
    app.kubernetes.io/name: vtu-results
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2   # Overridden by overlay
  selector:
    matchLabels:
      app: vtu-results

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero downtime

  template:
    metadata:
      labels:
        app: vtu-results
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"

    spec:
      # ── Security ──────────────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      # ── HA across AZs ─────────────────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: vtu-results

      terminationGracePeriodSeconds: 30

      containers:
        - name: vtu-results
          # Image name+tag is managed by Kustomize overlays
          # CI updates tag via: kustomize edit set image vtu-results=<ECR>:<sha>
          image: vtu-results
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          # App-specific secrets (NEXT_PUBLIC_BACKEND_URL, etc.) loaded from K8s Secret
          envFrom:
            - secretRef:
                name: vtu-results-secrets

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Probes ───────────────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
