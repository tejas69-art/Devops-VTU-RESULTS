apiVersion: v1
kind: Service
metadata:
  name: vtu-results
  labels:
    app: vtu-results
    app.kubernetes.io/name: vtu-results
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  selector:
    app: vtu-results
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
# ServiceMonitor — tells Prometheus to scrape this Service
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vtu-results
  labels:
    app: vtu-results
    # Must match Prometheus operator's serviceMonitorSelector
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: vtu-results
  endpoints:
    - port: http
      path: /api/metrics
      interval: 30s
      scrapeTimeout: 10s
