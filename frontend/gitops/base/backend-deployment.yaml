apiVersion: apps/v1
kind: Deployment
metadata:
  name: vtu-backend
  labels:
    app: vtu-backend
    app.kubernetes.io/name: vtu-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vtu-backend
  template:
    metadata:
      labels:
        app: vtu-backend
    spec:
      containers:
        - name: vtu-backend
          image: vtu-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
