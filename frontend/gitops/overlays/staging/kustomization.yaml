# =============================================================================
# Kustomize Overlay — STAGING
# Inherits everything from base, overrides namespace + replicas + image tag.
# CI auto-updates `newTag` on every push to main.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging


# ── Image Tag (updated by CI automatically) ───────────────────────────────────
# CI command: kustomize edit set image vtu-results=<ECR_REGISTRY>/vtu-results:<SHA>
images:
- name: vtu-backend
  newName: 938500344509.dkr.ecr.ap-south-1.amazonaws.com/vtu-backend
  newTag: 4fe6f3d6c63f99a7515cdc93317af716d44001ad
- name: vtu-results
  newName: 938500344509.dkr.ecr.ap-south-1.amazonaws.com/vtu-results
  newTag: 96a766385042958a687da11079836be92a6e05e0

# ── Staging-specific patches ──────────────────────────────────────────────────
  # Scale down for cost savings in staging

  # Staging HPA: min 1, max 3 replicas

  # Staging hostname
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: vtu-results
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 3
  target:
    kind: HorizontalPodAutoscaler
    name: vtu-results-hpa
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: staging.vtu-results.yourdomain.com
  target:
    kind: Ingress
    name: vtu-results

# ── Staging-specific labels ───────────────────────────────────────────────────
commonLabels:
  environment: staging

# ── Staging ConfigMap (env-specific vars) ────────────────────────────────────
configMapGenerator:
- literals:
  - NEXT_PUBLIC_APP_ENV=staging
  name: vtu-results-config
resources:
- ../../base
