# =============================================================================
# Kustomize Overlay — PRODUCTION
# Inherits everything from base, overrides namespace + image tag.
# CI auto-updates `newTag` on every tagged release.
# ArgoCD Application for production uses MANUAL sync for safety.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production


# ── Image Tag (updated by CI automatically) ───────────────────────────────────
# CI command: kustomize edit set image vtu-results=<ECR_REGISTRY>/vtu-results:<SHA>
# This is the file ArgoCD watches — every image tag change triggers a sync prompt.
images:
- name: vtu-backend
  newName: 938500344509.dkr.ecr.ap-south-1.amazonaws.com/vtu-backend
  newTag: 4fe6f3d6c63f99a7515cdc93317af716d44001ad
- name: vtu-results
  newName: 938500344509.dkr.ecr.ap-south-1.amazonaws.com/vtu-results
  newTag: 22bcd6543d1d1f9e84667fdb775164955b7959cf

# ── Production patches ────────────────────────────────────────────────────────
  # Production hostname
patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: vtu-results.yourdomain.com
  target:
    kind: Ingress
    name: vtu-results

# ── Production labels ─────────────────────────────────────────────────────────
commonLabels:
  environment: production

# ── Production ConfigMap ──────────────────────────────────────────────────────
configMapGenerator:
- literals:
  - NEXT_PUBLIC_APP_ENV=production
  name: vtu-results-config
resources:
- ../../base
