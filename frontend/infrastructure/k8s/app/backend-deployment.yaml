apiVersion: apps/v1
kind: Deployment
metadata:
  name: vtu-backend
  namespace: production   # Override with -n staging for staging deploys
  labels:
    app: vtu-backend
    version: "1.0.0"
    app.kubernetes.io/name: vtu-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vtu-backend
  template:
    metadata:
      labels:
        app: vtu-backend
        version: "1.0.0"
    spec:
      containers:
        - name: vtu-backend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/vtu-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
