# ─────────────────────────────────────────────────────────────────────────────
# Service — ClusterIP for internal cluster traffic
# The ALB Ingress routes external traffic → this Service
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: vtu-results-svc
  namespace: production
  labels:
    app: vtu-results
  annotations:
    # ServiceMonitor selector for Prometheus scraping
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/api/metrics"
spec:
  type: ClusterIP
  selector:
    app: vtu-results
  ports:
    - name: http
      port: 80
      targetPort: http      # Maps to containerPort named 'http' (3000)
      protocol: TCP

---
# ─────────────────────────────────────────────────────────────────────────────
# ServiceMonitor — Prometheus Operator CRD
# Tells Prometheus to scrape /api/metrics from all pods with app=vtu-results
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vtu-results-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack   # Must match Prometheus selector
spec:
  namespaceSelector:
    matchNames:
      - production
      - staging
  selector:
    matchLabels:
      app: vtu-results
  endpoints:
    - port: http
      path: /api/metrics
      interval: 15s        # Scrape every 15 seconds
      scrapeTimeout: 10s
