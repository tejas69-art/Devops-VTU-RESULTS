# ─────────────────────────────────────────────────────────────────────────────
# Deployment — VTU Results App
# Rolling update strategy with resource limits and health probes
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vtu-results
  namespace: production   # Override with -n staging for staging deploys
  labels:
    app: vtu-results
    version: "1.0.0"
    app.kubernetes.io/name: vtu-results
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vtu-results

  # ── Rolling Update Strategy ─────────────────────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1           # One extra pod during update
      maxUnavailable: 0     # Zero downtime — never take a pod down before new one is ready

  template:
    metadata:
      labels:
        app: vtu-results
        version: "1.0.0"
      annotations:
        # Prometheus scraping configuration
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"

    spec:
      # ── Pod Security ────────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      # ── Topology Spread (HA across AZs) ─────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: vtu-results

      # ── Grace period for clean shutdown ─────────────────────────────────────
      terminationGracePeriodSeconds: 30

      containers:
        - name: vtu-results
          # Image is set by CI/CD — placeholder here
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/vtu-results:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # ── Environment Variables ───────────────────────────────────────────
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_APP_ENV
              value: production
            - name: PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: vtu-results-secrets  # Created via: kubectl create secret generic

          # ── Resource Limits ─────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Liveness Probe ──────────────────────────────────────────────────
          # Restarts pod if app becomes unresponsive
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ── Readiness Probe ─────────────────────────────────────────────────
          # Removes pod from Service endpoints if not ready (no traffic during restart)
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Startup Probe ───────────────────────────────────────────────────
          # Gives Next.js time to cold-start before liveness kicks in
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30   # 30 * 10s = 5 min max startup time
            periodSeconds: 10

          # ── Container Security ──────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Next.js needs to write to .next cache
            capabilities:
              drop:
                - ALL

---
# ─────────────────────────────────────────────────────────────────────────────
# PodDisruptionBudget — ensures at least 1 pod is always available
# during node upgrades or voluntary disruptions
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vtu-results-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vtu-results

---
# ─────────────────────────────────────────────────────────────────────────────
# Horizontal Pod Autoscaler
# Scales from 2 to 10 pods based on CPU/memory
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vtu-results-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vtu-results
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
