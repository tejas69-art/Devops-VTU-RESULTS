# ─────────────────────────────────────────────────────────────────────────────
# Helm Values: kube-prometheus-stack (Prometheus + Alertmanager)
# Chart: https://github.com/prometheus-community/helm-charts
# Install: helm upgrade --install kube-prometheus-stack \
#            prometheus-community/kube-prometheus-stack \
#            -n monitoring \
#            -f infrastructure/helm/prometheus-values.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ─── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Scrape interval
    scrapeInterval: 15s
    evaluationInterval: 15s

    # Retention: 15 days of metrics
    retention: 15d
    retentionSize: "10GiB"

    # Persistent storage for TSDB
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Resource limits
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    # Run on dedicated monitoring nodes
    tolerations:
      - key: dedicated
        operator: Equal
        value: monitoring
        effect: NoSchedule
    nodeSelector:
      role: monitoring

    # ServiceMonitor selector — discover ALL ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # PodMonitor selector
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # PrometheusRule selector
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}

    # Additional scrape configs for apps not using ServiceMonitors
    additionalScrapeConfigs:
      - job_name: 'vtu-results-production'
        static_configs:
          - targets: ['vtu-results-svc.production.svc.cluster.local:80']
        metrics_path: /api/metrics
        scrape_interval: 15s

      - job_name: 'vtu-results-staging'
        static_configs:
          - targets: ['vtu-results-svc.staging.svc.cluster.local:80']
        metrics_path: /api/metrics
        scrape_interval: 30s

# ─── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  config:
    global:
      resolve_timeout: 5m
      # Slack webhook — configure via K8s secret in production
      # slack_api_url: <from-secret>

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'null'  # Default: swallow alerts
      routes:
        - match:
            severity: critical
          receiver: critical-alerts
          continue: true
        - match:
            severity: warning
          receiver: warning-alerts

    receivers:
      - name: 'null'
      - name: critical-alerts
        # Uncomment and configure Slack for real alerting:
        # slack_configs:
        #   - api_url: '<SLACK_WEBHOOK_URL>'
        #     channel: '#alerts-critical'
        #     title: '{{ .GroupLabels.alertname }}'
        #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        webhook_configs:
          - url: 'http://localhost:9093'  # Placeholder — replace with real webhook
            send_resolved: true
      - name: warning-alerts
        webhook_configs:
          - url: 'http://localhost:9093'  # Placeholder — replace with real webhook
            send_resolved: true

# ─── Node Exporter ────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── Kube State Metrics ───────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─── Disable Grafana here — using separate grafana-values.yaml ────────────────
grafana:
  enabled: false   # Managed via grafana-values.yaml (separate for clarity)
