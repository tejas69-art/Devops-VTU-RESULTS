# ─────────────────────────────────────────────────────────────────────────────
# PrometheusRule — Application Alert Rules
# Deployed via: kubectl apply -f infrastructure/helm/alertmanager-rules.yaml
# These rules fire alerts to Alertmanager which routes to Slack/PagerDuty
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vtu-results-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack    # Must match Prometheus ruleSelector
    app.kubernetes.io/name: vtu-results
spec:
  groups:

    # ─── Application Availability ─────────────────────────────────────────────
    - name: vtu-results.availability
      interval: 30s
      rules:

        - alert: AppDown
          expr: up{job="vtu-results-production"} == 0
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "VTU Results app is DOWN"
            description: "The application has been unreachable for more than 1 minute. Check pod status: kubectl get pods -n production"
            runbook_url: "https://github.com/tejas69-art/Devops-VTU-RESULTS/blob/main/infrastructure/README.md#runbook"

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace=~"production|staging",
              pod=~"vtu-results.*"
            }[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | humanize }} times in the last 15 minutes."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{
              namespace=~"production|staging",
              condition="true",
              pod=~"vtu-results.*"
            } == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for 5 minutes."

    # ─── HTTP Error Rate ───────────────────────────────────────────────────────
    - name: vtu-results.http
      interval: 30s
      rules:

        - alert: HighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (route)
              /
              sum(rate(http_requests_total[5m])) by (route)
            ) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High HTTP 5xx error rate on route {{ $labels.route }}"
            description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%) on route {{ $labels.route }} for the last 5 minutes."

        - alert: HighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[10m])) by (le, route)
            ) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High P99 latency on route {{ $labels.route }}"
            description: "P99 response time is {{ $value | humanizeDuration }} (threshold: 2s) on route {{ $labels.route }}."

        - alert: HighLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket[10m])) by (le, route)
            ) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High P95 latency on {{ $labels.route }}"
            description: "P95 response time is {{ $value | humanizeDuration }} on {{ $labels.route }}."

    # ─── Resource Usage ────────────────────────────────────────────────────────
    - name: vtu-results.resources
      interval: 60s
      rules:

        - alert: NodeHighCPU
          expr: |
            (
              1 - avg by (instance)(
                rate(node_cpu_seconds_total{mode="idle"}[5m])
              )
            ) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} CPU is high"
            description: "Node CPU usage is {{ $value | humanize }}% (threshold: 85%) for 10 minutes."

        - alert: NodeHighMemory
          expr: |
            (
              1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
            ) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} memory is high"
            description: "Node memory usage is {{ $value | humanize }}% (threshold: 85%)."

        - alert: ContainerHighMemory
          expr: |
            (
              container_memory_working_set_bytes{
                namespace=~"production|staging",
                container="vtu-results"
              }
              /
              container_spec_memory_limit_bytes{
                namespace=~"production|staging",
                container="vtu-results"
              }
            ) * 100 > 90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Container {{ $labels.container }} memory near limit"
            description: "Container is using {{ $value | humanize }}% of its memory limit. OOMKill risk."

        - alert: PersistentVolumeAlmostFull
          expr: |
            (
              kubelet_volume_stats_used_bytes
              /
              kubelet_volume_stats_capacity_bytes
            ) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PersistentVolume {{ $labels.persistentvolumeclaim }} is almost full"
            description: "PV is {{ $value | humanize }}% full in namespace {{ $labels.namespace }}."

    # ─── VTU Business Metrics ──────────────────────────────────────────────────
    - name: vtu-results.business
      interval: 60s
      rules:

        - alert: HighExternalApiErrorRate
          expr: |
            (
              sum(rate(external_api_calls_total{status="error"}[5m]))
              /
              sum(rate(external_api_calls_total[5m]))
            ) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "VTU external API has high error rate"
            description: "{{ $value | humanizePercentage }} of external VTU API calls are failing. VTU upstream may be down."

        - alert: ExternalApiHighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(external_api_call_duration_seconds_bucket[10m])) by (le, endpoint)
            ) > 15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "VTU API slow response"
            description: "VTU API P95 response time is {{ $value | humanizeDuration }} on {{ $labels.endpoint }}."
