# =============================================================================
# GitHub Actions — Frontend CI + GitOps Image Update
# File: frontend/.github/workflows/frontend-ci-cd.yml
#
# CI/CD Flow:
#   1. Lint + type-check
#   2. Docker build + push to ECR (NEXT_PUBLIC_BACKEND_URL baked in)
#   3. Update image tag in frontend/gitops/overlays/staging/kustomization.yaml
#   4. Commit + push back to main  ←  ArgoCD detects this and syncs to EKS
#
# Deploy to Production:
#   After step 3, ArgoCD shows the app as OutOfSync.
#   A human runs: argocd app sync vtu-frontend-production
#   OR approves in the ArgoCD UI.
#
# Required Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID
#   BACKEND_API_URL     — baked into Next.js at build time
#   GITOPS_TOKEN        — GitHub PAT (repo scope) for committing image tag back
#   GMAIL_USER, GMAIL_APP_PASSWORD, NOTIFY_EMAIL
# =============================================================================

name: ⚡ Frontend — CI/CD

on:
  # Also called via workflow_call (passes secrets through)
  workflow_call:
    inputs:
      backend_url:
        description: 'Backend API base URL to bake into the Next.js build'
        type: string
        required: false
    secrets:
      AWS_ACCESS_KEY_ID:     { required: true }
      AWS_SECRET_ACCESS_KEY: { required: true }
      AWS_ACCOUNT_ID:        { required: true }
      BACKEND_API_URL:       { required: false }
      GITOPS_TOKEN:          { required: false }
      GMAIL_USER:            { required: false }
      GMAIL_APP_PASSWORD:    { required: false }
      NOTIFY_EMAIL:          { required: false }

  # Standalone trigger on direct push
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AWS_REGION:      ap-south-1
  ECR_REPOSITORY:  vtu-results
  NODE_VERSION:    '20'
  BACKEND_URL:     ${{ inputs.backend_url || secrets.BACKEND_API_URL || 'http://localhost:8000' }}
  # Kustomize overlay paths for GitOps image tag update
  GITOPS_STAGING_DIR:    frontend/gitops/overlays/staging
  GITOPS_PRODUCTION_DIR: frontend/gitops/overlays/production

defaults:
  run:
    working-directory: frontend

jobs:

  # ─── Job 1: CI — Lint + Type Check ─────────────────────────────────────────
  ci:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 ESLint
        run: npm run lint

      - name: ✅ TypeScript type-check
        run: npm run type-check

      - name: 🏗️ Validate build (PR only)
        if: github.event_name == 'pull_request'
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_APP_ENV: ci
          NEXT_PUBLIC_BACKEND_URL: ${{ env.BACKEND_URL }}

  # ─── Job 2: Build + Push to ECR (main branch only) ─────────────────────────
  build-push:
    name: 🐳 Docker Build → ECR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    outputs:
      image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 🔐 Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # ── KEY: Backend URL baked into image at build time ──────────────────
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_APP_ENV=production
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          platforms:  linux/amd64

      - name: 📋 Print image info
        run: |
          echo "✅ Frontend image pushed:"
          echo "   ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          echo "   BACKEND_URL baked: ${{ env.BACKEND_URL }}"

  # ─── Job 3: GitOps — Update image tag → ArgoCD auto-syncs ──────────────
  gitops-update:
    name: 🔄 GitOps — Update Image Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-push

    steps:
      - name: 📥 Checkout (with GITOPS_TOKEN for push access)
        uses: actions/checkout@v4
        with:
          # Use PAT so the commit triggers other workflows
          token: ${{ secrets.GITOPS_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🛠️ Install Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: 🔗 Configure AWS + ECR registry
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 🔐 Get ECR registry URL
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏷️ Update STAGING overlay image tag
        working-directory: ${{ env.GITOPS_STAGING_DIR }}
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "🔗 Setting staging image to: ${ECR_IMAGE}:${{ github.sha }}"
          kustomize edit set image vtu-results="${ECR_IMAGE}:${{ github.sha }}"
          cat kustomization.yaml | grep newTag

      - name: 🏷️ Update PRODUCTION overlay image tag
        working-directory: ${{ env.GITOPS_PRODUCTION_DIR }}
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "🔗 Setting production image to: ${ECR_IMAGE}:${{ github.sha }}"
          kustomize edit set image vtu-results="${ECR_IMAGE}:${{ github.sha }}"
          cat kustomization.yaml | grep newTag

      - name: 📤 Commit & push image tag updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            ${{ env.GITOPS_STAGING_DIR }}/kustomization.yaml \
            ${{ env.GITOPS_PRODUCTION_DIR }}/kustomization.yaml

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "⚠️  No image tag changes to commit (already up to date)"
          else
            git commit -m "ci(gitops): update frontend image to ${{ github.sha }}

- Staging:    auto-sync via ArgoCD ✅
- Production: awaiting manual sync (argocd app sync vtu-frontend-production)
- Commit: ${{ github.sha }}
- Actor:  ${{ github.actor }}"
            git push origin main
            echo "✅ GitOps commit pushed — ArgoCD will detect and sync staging automatically"
          fi

      - name: 📊 Print ArgoCD sync instructions
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════╗"
          echo "║  GitOps Image Tag Updated!                    ║"
          echo "║  Image: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}  ║"
          echo "║                                               ║"
          echo "║  ✅ Staging: ArgoCD auto-syncing now           ║"
          echo "║  ⚠️  Production: run to deploy:               ║"
          echo "║  argocd app sync vtu-frontend-production      ║"
          echo "╚═══════════════════════════════════════════════╝"
          echo ""

  # ─── Job 4: Gmail Notification ───────────────────────────────────────
  notify:
    name: 📧 Gmail Alert
    runs-on: ubuntu-latest
    needs: [ci, build-push, gitops-update]
    if: |
      always() &&
      github.event_name != 'workflow_call'

    steps:
      - name: 📊 Compute status
        id: status
        run: |
          if [[ "${{ needs.gitops-update.result }}" == "success" ]]; then
            echo "emoji=✅"        >> $GITHUB_OUTPUT
            echo "color=#27ae60"  >> $GITHUB_OUTPUT
            echo "title=Frontend Deploy Succeeded" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌"        >> $GITHUB_OUTPUT
            echo "color=#e74c3c"  >> $GITHUB_OUTPUT
            echo "title=Frontend Deploy Failed" >> $GITHUB_OUTPUT
          fi

      - name: 📧 Send Gmail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to:       ${{ secrets.NOTIFY_EMAIL }}
          from:     "VTU CI/CD <${{ secrets.GMAIL_USER }}>"
          subject:  "${{ steps.status.outputs.emoji }} [VTU Frontend] ${{ steps.status.outputs.title }} — #${{ github.run_number }}"
          html_body: |
            <html><body style="font-family:Arial,sans-serif;padding:20px;background:#f4f6f9;">
            <div style="max-width:560px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
              <div style="background:${{ steps.status.outputs.color }};padding:20px;text-align:center;">
                <h2 style="color:#fff;margin:0;">${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.title }}</h2>
              </div>
              <div style="padding:20px;">
                <p><strong>Branch:</strong> ${{ github.ref_name }}<br>
                <strong>Commit:</strong> <code>${{ github.sha }}</code><br>
                <strong>Backend URL used:</strong> <code>${{ env.BACKEND_URL }}</code><br>
                <strong>Run:</strong> #${{ github.run_number }}</p>
                <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                   style="background:${{ steps.status.outputs.color }};color:#fff;padding:10px 20px;border-radius:4px;text-decoration:none;display:inline-block;margin-top:12px;">
                  View Logs
                </a>
              </div>
            </div></body></html>
