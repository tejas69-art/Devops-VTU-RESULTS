# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Pull Request Checks
# Runs on every PR to main branch
# Jobs run in parallel where possible
#
# Required Secrets (GitHub → Settings → Secrets):
#   SNYK_TOKEN        — Snyk API token (get free at snyk.io)
# ─────────────────────────────────────────────────────────────────────────────

name: 🔍 CI — Pull Request Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # Cancel old runs when new commits pushed

permissions:
  contents: read
  security-events: write     # For SARIF upload to GitHub Security tab
  pull-requests: write       # For posting PR comments

jobs:

  # ─── Job 1: Lint + Type Check ──────────────────────────────────────────────
  lint-typecheck:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run TypeScript type check
        run: npm run type-check

  # ─── Job 2: Build Validation ───────────────────────────────────────────────
  build-validate:
    name: 🏗️ Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Use example env for CI build
          NEXT_PUBLIC_APP_ENV: ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 1

  # ─── Job 3: Security — npm audit ──────────────────────────────────────────
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true   # Don't fail CI if Snyk token missing
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

  # ─── Job 4: Trivy Container Scan ──────────────────────────────────────────
  trivy-scan:
    name: 🛡️ Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'    # Don't fail CI — report only

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem

  # ─── Job 5: Lighthouse CI ─────────────────────────────────────────────────
  lighthouse:
    name: 🔦 Lighthouse Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-validate    # Needs build to be ready

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_APP_ENV: ci

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # Warn but don't block PRs

  # ─── PR Summary Comment ────────────────────────────────────────────────────
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [lint-typecheck, build-validate, security-audit, trivy-scan]
    if: always()

    steps:
      - name: Post CI status to PR
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Lint & Type Check': '${{ needs.lint-typecheck.result }}',
              'Build Validation': '${{ needs.build-validate.result }}',
              'Security Audit': '${{ needs.security-audit.result }}',
              'Trivy Scan': '${{ needs.trivy-scan.result }}',
            };
            const emoji = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
            const rows = Object.entries(jobs).map(([k, v]) => `| ${emoji(v)} **${k}** | ${v} |`).join('\n');
            const body = `## CI Results\n\n| Status | Job |\n|--------|-----|\n${rows}\n\n*Commit: \`${{ github.sha }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
